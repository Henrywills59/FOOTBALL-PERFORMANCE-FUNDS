services:
  postgres:
    image: postgres:16-alpine
    container_name: fpf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: football_performance_fund
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_performance_fund"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/football_performance_fund?schema=public
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: replace-with-a-long-random-secret
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      API_FOOTBALL_BASE_URL: https://v3.football.api-sports.io
      API_FOOTBALL_LEAGUE_IDS: ${API_FOOTBALL_LEAGUE_IDS:-39}
      FOOTBALL_SEASON: ${FOOTBALL_SEASON:-2026}
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      ODDS_API_BASE_URL: https://api.the-odds-api.com
      ODDS_API_SPORT: ${ODDS_API_SPORT:-soccer_epl}
      ENABLE_FOOTBALL_JOBS: ${ENABLE_FOOTBALL_JOBS:-false}
      FOOTBALL_SYNC_INTERVAL_MINUTES: ${FOOTBALL_SYNC_INTERVAL_MINUTES:-15}
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY:-}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET:-}
      NOWPAYMENTS_BASE_URL: ${NOWPAYMENTS_BASE_URL:-https://api.nowpayments.io}
      NOWPAYMENTS_USDT_TRC20_PAYOUT_WALLET: ${NOWPAYMENTS_USDT_TRC20_PAYOUT_WALLET:-}
      NOWPAYMENTS_USDT_ERC20_PAYOUT_WALLET: ${NOWPAYMENTS_USDT_ERC20_PAYOUT_WALLET:-}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"

volumes:
  postgres_data:
